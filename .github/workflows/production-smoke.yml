name: Production smoke

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:
    inputs:
      origin:
        description: Public origin to verify
        required: false
        default: https://vibecheck.wcgw.fun
        type: string

permissions:
  contents: read

concurrency:
  group: vibe-check-production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ORIGIN: ${{ inputs.origin || 'https://vibecheck.wcgw.fun' }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check production routes
        shell: bash
        run: |
          set +e
          node scripts/production-smoke.mjs "$ORIGIN" | tee production-smoke.txt
          status=${PIPESTATUS[0]}
          set -e
          {
            echo "## Production smoke"
            echo
            echo '```text'
            cat production-smoke.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"
